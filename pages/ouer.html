<!-- Parent Letters Module -->
<section id="panel-ouer" class="panel" style="padding: var(--sp-2xl); max-width: 1000px; margin: 0 auto;">
  <div class="card">
    <h2><i class="bi bi-envelope"></i> Parent Letter Generator</h2>
    <p class="mb-lg">Create professional WhatsApp-ready letters to parents.</p>
    <div class="form-group">
      <label>Learner Name:</label>
      <input type="text" class="form-input" placeholder="Enter learner name">
    </div>
    <div class="form-group">
      <label>Letter Type:</label>
      <select class="form-select">
        <option>Positive Update</option>
        <option>Academic Concern</option>
        <option>Behavioral Issue</option>
        <option>Attendance Alert</option>
        <option>Test/Assignment Result</option>
        <option>Parent Meeting Invite</option>
        <option>Progress Update</option>
        <option>Achievement Celebration</option>
      </select>
    </div>
    <div class="form-group">
      <label>Language:</label>
      <select class="form-select">
        <option>Afrikaans</option>
        <option>English</option>
        <option>isiZulu</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full"><i class="bi bi-sparkles"></i> Generate Letter</button>
  </div>
</section>

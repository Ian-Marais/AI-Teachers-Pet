<!-- Report Comments -->
<section id="panel-rapport" class="panel" style="padding: var(--sp-2xl); max-width: 1000px; margin: 0 auto;">
  <div class="card">
    <h2><i class="bi bi-chat-text"></i> Report Comments Generator</h2>
    <p class="mb-lg">Generate personalized, age-appropriate learner report comments.</p>
    <div class="form-group">
      <label>Learner Name:</label>
      <input type="text" class="form-input" placeholder="Enter learner name">
    </div>
    <div class="form-group">
      <label>Subject:</label>
      <select class="form-select">
        <option>Mathematics</option>
        <option>English</option>
        <option>Afrikaans</option>
        <option>Natural Sciences</option>
        <option>Social Sciences</option>
      </select>
    </div>
    <div class="form-group">
      <label>Performance Level:</label>
      <select class="form-select">
        <option>Excellent (Level 7)</option>
        <option>Good (Level 6)</option>
        <option>Satisfactory (Level 5)</option>
        <option>Adequate (Level 4)</option>
        <option>Needs Support (Levels 1-3)</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full"><i class="bi bi-sparkles"></i> Generate Comment</button>
  </div>
</section>
